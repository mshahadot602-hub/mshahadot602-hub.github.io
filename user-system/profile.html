<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的信息 - 自在空间</title>
<link rel="icon" type="image/png" href="../img/自在logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;350;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --warm-hue: 60;
    --surface-0: oklch(98% 0.002 var(--warm-hue));
    --surface-1: oklch(95% 0.003 var(--warm-hue));
    --text-primary: oklch(12% 0.003 var(--warm-hue));
    --text-secondary: oklch(35% 0.003 var(--warm-hue));
    --text-tertiary: oklch(52% 0.003 var(--warm-hue));
    --glass-bg: oklch(98% 0.002 var(--warm-hue) / 0.55);
    --glass-bg-strong: oklch(98% 0.002 var(--warm-hue) / 0.72);
    --glass-blur: saturate(180%) blur(30px);
    --shadow-glass-md: 0 4px 12px oklch(0% 0 0 / 0.05),0 2px 4px oklch(0% 0 0 / 0.03),inset 0 1px 0 oklch(100% 0 0 / 0.5);
    --radius-xl: 28px;
  }

  *{margin:0;padding:0;box-sizing:border-box;}

  body{
    font-family:'Noto Sans SC','PingFang SC','Microsoft YaHei',system-ui,sans-serif;
    background:var(--surface-0);
    color:var(--text-primary);
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    padding:20px;
    background-image:
      radial-gradient(circle at 20% 80%,oklch(90% 0.01 var(--warm-hue)/0.1) 0%,transparent 50%),
      radial-gradient(circle at 80% 20%,oklch(85% 0.01 var(--warm-hue)/0.08) 0%,transparent 50%);
  }

  .profile-container{width:100%;max-width:480px;}

  .profile-card{
    background:var(--glass-bg);
    backdrop-filter:var(--glass-blur);
    -webkit-backdrop-filter:var(--glass-blur);
    border-radius:var(--radius-xl);
    padding:48px 40px;
    box-shadow:var(--shadow-glass-md);
    border:1px solid oklch(100% 0 0/0.2);
    text-align:center;
  }

  .avatar{
    width:120px;height:120px;
    border-radius:50%;overflow:hidden;
    margin:0 auto 24px;
    border:3px solid oklch(100% 0 0/0.5);
    box-shadow:0 4px 20px oklch(0% 0 0/0.1);
    background:var(--surface-1);
  }

  .avatar img{width:100%;height:100%;object-fit:cover;}

  .avatar-placeholder{
    width:100%;height:100%;
    display:flex;align-items:center;justify-content:center;
    font-size:48px;color:var(--text-tertiary);opacity:0.4;
  }

  .name{
    font-family:'Noto Serif SC',serif;
    font-size:28px;font-weight:600;
    color:var(--text-primary);margin-bottom:8px;
  }

  .bio{
    font-size:15px;color:var(--text-secondary);
    line-height:1.7;max-width:340px;
    margin:0 auto 32px;
  }

  .back-link{
    display:inline-flex;align-items:center;gap:8px;
    padding:10px 28px;border-radius:100px;
    border:0.5px solid oklch(88% 0.004 var(--warm-hue)/0.6);
    background:var(--glass-bg);color:var(--text-secondary);
    font-size:14px;font-weight:500;text-decoration:none;
    transition:all 0.2s;
  }

  .back-link:hover{background:var(--glass-bg-strong);color:var(--text-primary);}

  .not-logged-in{text-align:center;color:var(--text-tertiary);padding:60px 20px;display:none;}

  .not-logged-in p{margin-bottom:20px;font-size:16px;}

  .login-link{
    display:inline-block;padding:12px 32px;border-radius:100px;
    background:oklch(18% 0.01 var(--warm-hue));color:#fff;
    text-decoration:none;font-size:15px;font-weight:500;
  }
</style>
</head>
<body>
<div class="profile-container">
  <div class="profile-card" id="profileCard">
    <div class="avatar" id="avatarWrap">
      <img id="avatarImg" src="" alt="" style="display:none;" onerror="this.style.display='none';document.getElementById('avatarPlaceholder').style.display='flex';">
      <div class="avatar-placeholder" id="avatarPlaceholder">&#128100;</div>
    </div>
    <h1 class="name" id="profileName">--</h1>
    <p class="bio" id="profileBio">这个人很懒，还没有填写个人简介。</p>
    <a href="../index.html" class="back-link">&#8592; 返回首页</a>
  </div>
  <div class="not-logged-in" id="notLoggedIn">
    <p>请先登录以查看个人信息</p>
    <a href="login.html" class="login-link">前往登录</a>
  </div>
</div>

<script>
(function() {
  try {
    var userData = JSON.parse(localStorage.getItem('zizai_user') || 'null');
  } catch(e) { userData = null; }

  if (userData && userData.name) {
    document.getElementById('profileName').textContent = userData.name;
    if (userData.avatar) {
      var img = document.getElementById('avatarImg');
      img.src = userData.avatar;
      img.style.display = 'block';
      document.getElementById('avatarPlaceholder').style.display = 'none';
    }
  } else {
    document.getElementById('profileCard').style.display = 'none';
    document.getElementById('notLoggedIn').style.display = 'block';
  }
})();
</script>
</body>
</html>
