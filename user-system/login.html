<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 自在空间</title>
    <link rel="icon" type="image/png" href="../img/自在logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;350;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --warm-hue: 60;
            --surface-0: oklch(98% 0.002 var(--warm-hue));
            --surface-1: oklch(95% 0.003 var(--warm-hue));
            --surface-2: oklch(90% 0.004 var(--warm-hue));
            --surface-dark: oklch(12% 0.003 var(--warm-hue));
            --text-primary: oklch(12% 0.003 var(--warm-hue));
            --text-secondary: oklch(35% 0.003 var(--warm-hue));
            --glass-bg: oklch(98% 0.002 var(--warm-hue) / 0.55);
            --glass-blur: saturate(180%) blur(30px);
            --accent: oklch(65% 0.15 260);
            --accent-hover: oklch(60% 0.18 260);
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--surface-0);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background-image: 
                radial-gradient(circle at 20% 80%, oklch(90% 0.01 var(--warm-hue) / 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, oklch(85% 0.01 var(--warm-hue) / 0.08) 0%, transparent 50%);
        }

        .login-container {
            width: 100%;
            max-width: 400px;
        }

        .login-card {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 
                0 8px 32px oklch(0% 0 0 / 0.08),
                0 2px 8px oklch(0% 0 0 / 0.04),
                inset 0 1px 0 oklch(100% 0 0 / 0.4);
            border: 1px solid oklch(100% 0 0 / 0.2);
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo img {
            height: 60px;
            margin-bottom: 12px;
        }

        .logo h1 {
            font-family: 'Noto Serif SC', serif;
            font-size: 24px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .logo p {
            font-size: 14px;
            color: var(--text-secondary);
            opacity: 0.8;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            font-size: 16px;
            font-family: 'Noto Sans SC', sans-serif;
            background: oklch(100% 0 0 / 0.4);
            border: 1px solid oklch(88% 0.004 var(--warm-hue) / 0.6);
            border-radius: 12px;
            color: var(--text-primary);
            transition: all 0.2s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px oklch(65% 0.15 260 / 0.15);
            background: oklch(100% 0 0 / 0.6);
        }

        .btn {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 500;
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .links {
            margin-top: 24px;
            text-align: center;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .links a {
            color: var(--accent);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .links a:hover {
            color: var(--accent-hover);
            text-decoration: underline;
        }

        .error-message {
            background: oklch(80% 0.1 20 / 0.1);
            color: oklch(50% 0.2 20);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .success-message {
            background: oklch(85% 0.1 140 / 0.1);
            color: oklch(50% 0.2 140);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid oklch(90% 0.004 var(--warm-hue));
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 30px 20px;
            }
            
            .logo img {
                height: 50px;
            }
            
            .logo h1 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <img src="../img/自在logo.png" alt="自在空间">
                <h1>自在空间</h1>
                <p>用科技赋能善因传播</p>
            </div>

            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">用户名或邮箱</label>
                    <input type="text" id="username" class="form-control" required>
                </div>

                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" class="form-control" required>
                </div>

                <div class="loading" id="loading">
                    <div class="loading-spinner"></div>
                    <div style="margin-top: 8px; color: var(--text-secondary);">登录中...</div>
                </div>

                <button type="submit" class="btn" id="submitBtn">登录</button>
            </form>

            <div class="links">
                <p>还没有账户？ <a href="register.html">立即注册</a></p>
                <p><a href="../index.html">返回首页</a></p>
            </div>
        </div>
    </div>

    <script>
        // API基础URL - 根据实际后端部署地址修改
        const API_BASE_URL = 'http://localhost:5000/api';
        // const API_BASE_URL = 'https://your-domain.com/api'; // 生产环境

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            // 显示加载状态
            document.getElementById('loading').style.display = 'block';
            document.getElementById('submitBtn').disabled = true;
            hideMessages();
            
            try {
                const response = await fetch(`${API_BASE_URL}/user/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // 保存用户信息和token
                    localStorage.setItem('user', JSON.stringify(data.data));
                    localStorage.setItem('token', data.token);
                    
                    showSuccess('登录成功！正在跳转...');
                    
                    // 根据用户角色跳转到不同页面
                    setTimeout(() => {
                        if (data.data.is_admin) {
                            window.location.href = 'admin.html';
                        } else {
                            window.location.href = 'profile.html';
                        }
                    }, 1500);
                    
                } else {
                    showError(data.message || '登录失败，请检查用户名和密码');
                }
            } catch (error) {
                console.error('登录错误:', error);
                showError('网络错误，请稍后重试');
            } finally {
                // 隐藏加载状态
                document.getElementById('loading').style.display = 'none';
                document.getElementById('submitBtn').disabled = false;
            }
        });

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
        }

        function hideMessages() {
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';
        }

        // 检查是否已登录
        function checkLoginStatus() {
            const token = localStorage.getItem('token');
            if (token) {
                // 如果已登录，根据角色跳转
                const user = JSON.parse(localStorage.getItem('user') || '{}');
                if (user.is_admin) {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = 'profile.html';
                }
            }
        }

        // 页面加载时检查登录状态
        window.addEventListener('load', checkLoginStatus);
    </script>
</body>
</html>
