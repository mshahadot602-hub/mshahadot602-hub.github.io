<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>自在网盘</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #0a0a12;
  color: #e0e0e0;
  min-height: 100vh;
  overflow-x: hidden;
}

.stars-bg {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 0;
  background: radial-gradient(ellipse at 20% 20%, rgba(72, 72, 200, 0.08) 0%, transparent 50%),
              radial-gradient(ellipse at 80% 60%, rgba(32, 128, 192, 0.06) 0%, transparent 50%),
              radial-gradient(ellipse at 50% 80%, rgba(96, 48, 160, 0.06) 0%, transparent 50%);
}
.stars-bg::before {
  content: '';
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background-image: 
    radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.6), transparent),
    radial-gradient(1px 1px at 25% 35%, rgba(255,255,255,0.4), transparent),
    radial-gradient(1.5px 1.5px at 40% 10%, rgba(255,255,255,0.5), transparent),
    radial-gradient(1px 1px at 55% 45%, rgba(255,255,255,0.3), transparent),
    radial-gradient(1px 1px at 70% 20%, rgba(255,255,255,0.5), transparent),
    radial-gradient(1.5px 1.5px at 85% 50%, rgba(255,255,255,0.4), transparent),
    radial-gradient(1px 1px at 15% 60%, rgba(255,255,255,0.35), transparent),
    radial-gradient(1px 1px at 60% 75%, rgba(255,255,255,0.4), transparent),
    radial-gradient(1px 1px at 90% 85%, rgba(255,255,255,0.45), transparent),
    radial-gradient(1.5px 1.5px at 35% 80%, rgba(255,255,255,0.35), transparent),
    radial-gradient(1px 1px at 75% 30%, rgba(255,255,255,0.3), transparent),
    radial-gradient(1px 1px at 5% 85%, rgba(255,255,255,0.4), transparent);
}

/* ==================== 登录页 ==================== */
.login-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center; z-index: 10;
}
.login-card {
  background: rgba(20, 20, 40, 0.92);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px; padding: 44px 36px;
  width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
.login-logo {
  display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 8px;
}
.login-logo .icon {
  width: 44px; height: 44px;
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  border-radius: 12px; display: flex; align-items: center; justify-content: center;
  font-size: 24px; color: #fff;
}
.login-logo .text {
  font-size: 24px; font-weight: 700; letter-spacing: 1px;
  background: linear-gradient(135deg, #a5b4fc, #c4b5fd);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.login-subtitle { text-align: center; font-size: 13px; color: rgba(255,255,255,0.35); margin-bottom: 28px; }
.login-field { margin-bottom: 18px; }
.login-field label { display: block; font-size: 12px; color: rgba(255,255,255,0.4); margin-bottom: 6px; }
.login-field input {
  width: 100%; padding: 12px 16px;
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
  border-radius: 10px; color: #e0e0e0; font-size: 14px; outline: none;
  transition: border-color 0.3s;
}
.login-field input:focus { border-color: rgba(139,92,246,0.5); }
.login-btn {
  width: 100%; padding: 12px; border: none; border-radius: 10px;
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  color: #fff; font-size: 15px; font-weight: 600; cursor: pointer;
  box-shadow: 0 4px 16px rgba(99,102,241,0.35);
  transition: all 0.2s; margin-top: 8px;
}
.login-btn:hover { box-shadow: 0 6px 24px rgba(99,102,241,0.5); transform: translateY(-1px); }
.login-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.login-error { color: #f87171; font-size: 12px; text-align: center; margin-top: 12px; min-height: 18px; }

/* ==================== 主界面 ==================== */
.app { position: relative; z-index: 1; display: none; flex-direction: column; height: 100vh; }

.header {
  padding: 12px 24px; display: flex; align-items: center; justify-content: space-between;
  background: rgba(18, 18, 30, 0.7);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.logo { display: flex; align-items: center; gap: 12px; }
.logo-icon {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  border-radius: 10px; display: flex; align-items: center; justify-content: center;
  font-size: 20px; color: #fff;
}
.logo-text { font-size: 20px; font-weight: 700; letter-spacing: 1px;
  background: linear-gradient(135deg, #a5b4fc, #c4b5fd); -webkit-background-clip: text;
  -webkit-text-fill-color: transparent; }
.header-actions { display: flex; gap: 10px; align-items: center; }
.user-badge {
  display: flex; align-items: center; gap: 8px; padding: 6px 14px;
  background: rgba(139,92,246,0.15); border: 1px solid rgba(139,92,246,0.25);
  border-radius: 10px; font-size: 13px; color: #c4b5fd;
}
.logout-btn {
  padding: 6px 14px; background: rgba(239,68,68,0.12); color: #f87171;
  border: 1px solid rgba(239,68,68,0.2); border-radius: 8px;
  font-size: 12px; cursor: pointer; transition: all 0.2s; font-family: inherit;
}
.logout-btn:hover { background: rgba(239,68,68,0.25); }
.search-box {
  display: flex; align-items: center; gap: 8px;
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
  border-radius: 10px; padding: 8px 14px; transition: all 0.3s;
}
.search-box:focus-within { border-color: rgba(139,92,246,0.5); background: rgba(255,255,255,0.1); }
.search-box input {
  background: none; border: none; outline: none; color: #e0e0e0;
  font-size: 13px; width: 180px;
}
.search-box input::placeholder { color: rgba(255,255,255,0.3); }
.search-icon { color: rgba(255,255,255,0.4); font-size: 14px; cursor: pointer; }

.main { flex: 1; display: flex; overflow: hidden; }

.sidebar {
  width: 260px; background: rgba(14, 14, 26, 0.6);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-right: 1px solid rgba(255,255,255,0.06);
  display: flex; flex-direction: column; padding: 16px 0;
}
.sidebar-section { padding: 0 16px; margin-bottom: 8px; }
.sidebar-title {
  font-size: 11px; text-transform: uppercase; letter-spacing: 2px;
  color: rgba(255,255,255,0.3); margin-bottom: 10px; padding: 0 4px;
}
.drive-item {
  display: flex; align-items: center; gap: 12px; padding: 12px 14px;
  border-radius: 12px; cursor: pointer; transition: all 0.25s;
  border: 1px solid transparent; margin-bottom: 4px; position: relative;
}
.drive-item:hover { background: rgba(255,255,255,0.05); }
.drive-item.active {
  background: rgba(139,92,246,0.15); border-color: rgba(139,92,246,0.3);
  box-shadow: 0 0 20px rgba(139,92,246,0.1);
}
.drive-icon {
  width: 40px; height: 40px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0;
}
.drive-icon.personal { background: rgba(168,85,247,0.2); color: #a855f7; }
.drive-icon.share  { background: rgba(99,102,241,0.2); color: #818cf8; }
.drive-icon.share2 { background: rgba(34,197,94,0.2); color: #4ade80; }
.drive-icon.share3 { background: rgba(251,146,60,0.2); color: #fb923c; }
.drive-icon.share4 { background: rgba(236,72,153,0.2); color: #f472b6; }
.drive-info { flex: 1; min-width: 0; }
.drive-name { font-size: 14px; font-weight: 600; }
.drive-label { font-size: 11px; color: rgba(255,255,255,0.35); margin-top: 2px; }
.drive-mounted { font-size: 10px; color: #4ade80; margin-top: 2px; display: none; }
.drive-mounted.show { display: block; }

.sidebar-footer {
  margin-top: auto; padding: 20px 16px;
  border-top: 1px solid rgba(255,255,255,0.06);
}
.usage-card {
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 14px; padding: 16px;
}
.usage-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.usage-label { font-size: 11px; color: rgba(255,255,255,0.4); letter-spacing: 1px; }
.usage-value { font-size: 12px; color: rgba(255,255,255,0.6); }
.usage-bar-bg {
  height: 6px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden; margin-bottom: 10px;
}
.usage-bar-fill {
  height: 100%; border-radius: 3px;
  background: linear-gradient(90deg, #6366f1, #8b5cf6, #a78bfa);
  transition: width 0.8s ease;
}
.usage-detail { font-size: 11px; color: rgba(255,255,255,0.35); line-height: 1.6; }

.content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.breadcrumb {
  padding: 12px 24px; display: flex; align-items: center; gap: 6px;
  background: rgba(14,14,26,0.4); border-bottom: 1px solid rgba(255,255,255,0.05);
  flex-wrap: wrap;
}
.breadcrumb-item {
  font-size: 13px; color: rgba(255,255,255,0.4); cursor: pointer;
  padding: 3px 6px; border-radius: 4px; transition: all 0.2s;
}
.breadcrumb-item:hover { color: #a78bfa; background: rgba(139,92,246,0.1); }
.breadcrumb-sep { color: rgba(255,255,255,0.2); font-size: 12px; user-select: none; }

.toolbar {
  padding: 12px 24px; display: flex; gap: 8px; align-items: center;
  border-bottom: 1px solid rgba(255,255,255,0.05); flex-wrap: wrap;
}
.btn {
  padding: 8px 16px; border: none; border-radius: 8px; font-size: 13px; cursor: pointer;
  display: flex; align-items: center; gap: 6px; transition: all 0.2s;
  font-family: inherit; white-space: nowrap;
}
.btn-primary {
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  color: #fff; box-shadow: 0 2px 10px rgba(99,102,241,0.3);
}
.btn-primary:hover { box-shadow: 0 4px 16px rgba(99,102,241,0.4); transform: translateY(-1px); }
.btn-outline {
  background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.7);
  border: 1px solid rgba(255,255,255,0.12);
}
.btn-outline:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.2); }
.btn-accent {
  background: rgba(34,197,94,0.12); color: #4ade80;
  border: 1px solid rgba(34,197,94,0.25);
}
.btn-accent:hover { background: rgba(34,197,94,0.2); }
.btn-warn {
  background: rgba(251,146,60,0.12); color: #fb923c;
  border: 1px solid rgba(251,146,60,0.25);
}
.btn-warn:hover { background: rgba(251,146,60,0.2); }
.btn-info {
  background: rgba(56,189,248,0.12); color: #38bdf8;
  border: 1px solid rgba(56,189,248,0.25);
}
.btn-info:hover { background: rgba(56,189,248,0.2); }
.btn-danger { background: rgba(239,68,68,0.15); color: #f87171; border: 1px solid rgba(239,68,68,0.2); }
.btn-danger:hover { background: rgba(239,68,68,0.25); }
.btn-sm { padding: 6px 12px; font-size: 12px; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.toolbar-sep { width: 1px; height: 24px; background: rgba(255,255,255,0.08); margin: 0 4px; }
.path-info { margin-left: auto; font-size: 12px; color: rgba(255,255,255,0.3); }

.file-list { flex: 1; overflow-y: auto; padding: 8px 0; }
.file-list::-webkit-scrollbar { width: 6px; }
.file-list::-webkit-scrollbar-track { background: transparent; }
.file-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

.file-table { width: 100%; border-collapse: collapse; }
.file-table th {
  text-align: left; padding: 10px 24px; font-size: 11px; font-weight: 500;
  color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 1px;
  border-bottom: 1px solid rgba(255,255,255,0.05); user-select: none;
}
.file-table td { padding: 10px 24px; border-bottom: 1px solid rgba(255,255,255,0.03); }
.file-row { cursor: pointer; transition: background 0.15s; }
.file-row:hover { background: rgba(255,255,255,0.03); }
.file-row.selected { background: rgba(139,92,246,0.1); }
.file-name-cell { display: flex; align-items: center; gap: 10px; }
.file-icon { font-size: 22px; flex-shrink: 0; width: 28px; text-align: center; }
.file-name { font-size: 13px; font-weight: 500; max-width: 380px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.file-meta { font-size: 12px; color: rgba(255,255,255,0.35); }
.file-size { font-size: 12px; color: rgba(255,255,255,0.4); }
.file-share-tag { font-size: 10px; color: #818cf8; margin-left: 6px; }
.file-actions { display: flex; gap: 6px; opacity: 0; transition: opacity 0.2s; }
.file-row:hover .file-actions { opacity: 1; }
.action-btn {
  padding: 4px 10px; font-size: 11px; border-radius: 5px; border: none; cursor: pointer;
  background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.5);
  transition: all 0.2s; font-family: inherit;
}
.action-btn:hover { background: rgba(255,255,255,0.15); color: #e0e0e0; }
.action-btn.danger:hover { background: rgba(239,68,68,0.2); color: #f87171; }

.empty-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 300px; color: rgba(255,255,255,0.2);
}
.empty-icon { font-size: 64px; margin-bottom: 16px; }
.empty-text { font-size: 15px; }

.modal-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center; z-index: 100;
}
.modal {
  background: rgba(20,20,36,0.95); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px; padding: 24px; min-width: 420px; max-width: 560px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  max-height: 80vh; overflow-y: auto;
}
.modal h3 { font-size: 16px; margin-bottom: 16px; color: #e0e0e0; }
.modal input[type="text"], .modal select {
  width: 100%; padding: 10px 14px; background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12); border-radius: 8px;
  color: #e0e0e0; font-size: 14px; outline: none; margin-bottom: 10px;
}
.modal input[type="text"]:focus, .modal select:focus { border-color: rgba(139,92,246,0.5); }
.modal select { cursor: pointer; }
.modal select option { background: #1a1a2e; color: #e0e0e0; }
.modal label { display: block; font-size: 12px; color: rgba(255,255,255,0.4); margin-bottom: 4px; margin-top: 8px; }
.form-row { display: flex; gap: 10px; }
.form-row > div { flex: 1; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 14px; }

.drop-zone {
  border: 2px dashed rgba(255,255,255,0.15); border-radius: 12px;
  padding: 30px; text-align: center; margin-bottom: 12px;
  transition: all 0.3s; cursor: pointer;
}
.drop-zone.drag-over { border-color: #8b5cf6; background: rgba(139,92,246,0.08); }
.drop-zone-text { color: rgba(255,255,255,0.35); font-size: 13px; }
.drop-zone-icon { font-size: 36px; margin-bottom: 8px; color: rgba(255,255,255,0.2); }

.upload-progress { margin-top: 12px; display: none; }
.upload-progress.show { display: block; }
.progress-item { display: flex; align-items: center; gap: 10px; padding: 4px 0; }
.progress-name { flex: 1; font-size: 12px; color: rgba(255,255,255,0.5); }
.progress-bar-bg { height: 3px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; width: 100px; }
.progress-bar-fill { height: 100%; background: #8b5cf6; border-radius: 2px; transition: width 0.3s; }
.progress-status { font-size: 11px; color: rgba(255,255,255,0.4); width: 40px; text-align: right; }

.mount-list-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 12px; border-radius: 8px; margin-bottom: 6px;
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06);
}
.mount-info { display: flex; align-items: center; gap: 10px; }
.mount-drive { font-size: 16px; font-weight: 700; color: #4ade80; }
.mount-arrow { color: rgba(255,255,255,0.2); margin: 0 6px; }
.mount-unc { font-size: 12px; color: rgba(255,255,255,0.4); }

.toast {
  position: fixed; top: 20px; right: 20px; z-index: 200;
  padding: 12px 20px; border-radius: 10px; font-size: 13px;
  background: rgba(20,20,36,0.9); border: 1px solid rgba(255,255,255,0.1);
  backdrop-filter: blur(10px); color: #e0e0e0;
  box-shadow: 0 8px 30px rgba(0,0,0,0.4);
  animation: slideIn 0.3s ease; max-width: 360px;
}
.toast.success { border-left: 3px solid #4ade80; }
.toast.error { border-left: 3px solid #f87171; }
.toast.info { border-left: 3px solid #38bdf8; }
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

@media (max-width: 768px) {
  .sidebar { width: 200px; }
  .file-name { max-width: 120px; }
  .modal { min-width: 300px; }
  .login-card { width: 320px; padding: 32px 24px; }
}
</style>
</head>
<body>

<div class="stars-bg"></div>

<!-- ==================== 登录界面 ==================== -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-card">
    <div class="login-logo">
      <div class="icon">☁</div>
      <span class="text">自在网盘</span>
    </div>
    <div class="login-subtitle">请输入账号登录</div>
    <div class="login-field">
      <label>用户名</label>
      <input type="text" id="loginUser" placeholder="输入用户名" autocomplete="off" onkeydown="if(event.key==='Enter')document.getElementById('loginPass').focus()">
    </div>
    <div class="login-field">
      <label>密码</label>
      <input type="password" id="loginPass" placeholder="输入密码" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="login-btn" id="loginBtn" onclick="doLogin()">登 录</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- ==================== 主界面 ==================== -->
<div class="app" id="mainApp">
  <div class="header">
    <div class="logo">
      <div class="logo-icon">☁</div>
      <span class="logo-text">自在网盘</span>
    </div>
    <div class="header-actions">
      <div class="search-box">
        <span class="search-icon" onclick="startGlobalSearch()" title="全局搜索">⌕</span>
        <input type="text" id="searchInput" placeholder="跨盘搜索..." onkeydown="if(event.key==='Enter') startGlobalSearch()">
      </div>
      <button class="btn btn-info btn-sm" onclick="showFindModal()">🔍 高级查找</button>
      <button class="btn btn-accent btn-sm" onclick="showMountModal()">💾 挂载管理</button>
      <button class="btn btn-outline btn-sm" onclick="showShareManageModal()">🔗 分享管理</button>
      <button class="btn btn-warn btn-sm" onclick="refreshAll()">🔄 刷新服务器</button>
      <div class="user-badge" id="userBadge"></div>
      <button class="logout-btn" onclick="doLogout()">退出</button>
    </div>
  </div>

  <div class="main">
    <div class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-title">我的网盘</div>
        <div id="driveList"></div>
      </div>

      <div class="sidebar-footer">
        <div class="usage-card">
          <div class="usage-header">
            <span class="usage-label">总容量</span>
            <span class="usage-value" id="usagePercent">--</span>
          </div>
          <div class="usage-bar-bg">
            <div class="usage-bar-fill" id="usageBar" style="width:0%"></div>
          </div>
          <div class="usage-detail" id="usageDetail">加载中...</div>
        </div>
      </div>
    </div>

    <div class="content">
      <div class="breadcrumb" id="breadcrumb"></div>

      <div class="toolbar">
        <button class="btn btn-primary btn-sm" onclick="showUploadModal()">⬆ 上传文件</button>
        <button class="btn btn-outline btn-sm" onclick="showMkdirModal()">📁 新建文件夹</button>
        <button class="btn btn-danger btn-sm" id="deleteBtn" onclick="deleteSelected()" disabled>🗑 删除选中</button>
        <span class="toolbar-sep"></span>
        <button class="btn btn-outline btn-sm" onclick="refreshList()" title="刷新当前目录">↻</button>
        <span class="path-info" id="pathInfo"></span>
      </div>

      <div class="file-list" id="fileList">
        <div class="empty-state">
          <div class="empty-icon">📂</div>
          <div class="empty-text">选择一个盘符开始浏览</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 上传弹窗 -->
<div class="modal-overlay" id="uploadModal" style="display:none">
  <div class="modal">
    <h3>上传文件到 <span id="uploadPathLabel"></span></h3>

</div>

<!-- 高级查找弹窗 -->
<div class="modal-overlay" id="findModal" style="display:none">
  <div class="modal">
    <h3>高级查找</h3>
    <label>搜索盘符</label>
    <select id="findShare"></select>
    <label>文件名包含</label>
    <input type="text" id="findName" placeholder="关键词">
    <div class="form-row">
      <div><label>文件类型</label><select id="findType"><option value="">全部</option><option value="file">文件</option><option value="folder">文件夹</option></select></div>
      <div><label>扩展名</label><input type="text" id="findExt" placeholder="如 pdf, docx"></div>
    </div>
    <div class="form-row">
      <div><label>最小大小 (MB)</label><input type="text" id="findMinSize" placeholder="如 1"></div>
      <div><label>最大大小 (MB)</label><input type="text" id="findMaxSize" placeholder="如 100"></div>
    </div>
    <div class="form-row">
      <div><label>修改时间从</label><input type="text" id="findAfter" placeholder="2024-01-01"></div>
      <div><label>修改时间至</label><input type="text" id="findBefore" placeholder="2025-12-31"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline btn-sm" onclick="closeModal('findModal')">取消</button>
      <button class="btn btn-primary btn-sm" onclick="execFind()">开始查找</button>
    </div>
  </div>
</div>

<script>
const API_BASE = (() => {
  const host = location.hostname;
  if (host === '192.168.1.23' || host === 'localhost' || host === '127.0.0.1' || host === '125.122.217.116') {
    return '';
  }
  return 'http://192.168.1.23:8889';
})();

let state = {
  token: '',
  username: '',
  currentShare: null,
  currentPath: '',
  files: [],
  selectedFiles: new Set(),
  pendingFiles: [],
  searchMode: false,
};

function authFetch(url, options = {}) {
  const headers = options.headers || {};
  if (state.token) {
    headers['Authorization'] = 'Bearer ' + state.token;
  }
  return fetch(url, { ...options, headers });
}

const shares = [
  { key: 'Share',  label: '共享盘', icon: '📁', cls: 'share' },
  { key: 'Share2', label: '部门盘', icon: '📁', cls: 'share2' },
  { key: 'Share3', label: '项目盘', icon: '📁', cls: 'share3' },
  { key: 'Share4', label: '归档盘', icon: '📁', cls: 'share4' },
];

// ==================== 登录 ====================

function checkLogin() {
  const saved = sessionStorage.getItem('zizai_token');
  const savedUser = sessionStorage.getItem('zizai_user');
  if (saved && savedUser) {
    state.token = saved;
    state.username = savedUser;
    showMainApp();
  }
}

async function doLogin() {
  const user = document.getElementById('loginUser').value.trim();
  const pass = document.getElementById('loginPass').value;
  const errEl = document.getElementById('loginError');
  const btn = document.getElementById('loginBtn');

  if (!user) { errEl.textContent = '请输入用户名'; return; }
  if (!pass) { errEl.textContent = '请输入密码'; return; }

  errEl.textContent = '';
  btn.disabled = true;
  btn.textContent = '登录中...';

  try {
    const form = new URLSearchParams();
    form.append('username', user);
    form.append('password', pass);

    const resp = await fetch(`${API_BASE}/api/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: form.toString()
    });
    const data = await resp.json();

    if (resp.ok && data.token) {
      state.token = data.token;
      state.username = data.username;
      sessionStorage.setItem('zizai_token', data.token);
      sessionStorage.setItem('zizai_user', data.username);
      showMainApp();
    } else {
      errEl.textContent = data.error || '登录失败';
    }
  } catch (e) {
    errEl.textContent = '连接失败: ' + e.message;
  } finally {
    btn.disabled = false;
    btn.textContent = '登 录';
  }
}

function showMainApp() {
  document.getElementById('loginOverlay').style.display = 'none';
  document.getElementById('mainApp').style.display = 'flex';
  document.getElementById('userBadge').textContent = state.username;
  init();
}

function doLogout() {
  state.token = '';
  state.username = '';
  sessionStorage.removeItem('zizai_token');
  sessionStorage.removeItem('zizai_user');
  document.getElementById('loginOverlay').style.display = 'flex';
  document.getElementById('mainApp').style.display = 'none';
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
  document.getElementById('loginError').textContent = '';
}

// ==================== 主应用 ====================

function init() {
  renderDrives();
  loadUsage();
  setInterval(() => {
    if (state.currentShare === 'personal') loadPersonalUsage();
    else loadUsage();
  }, 60000);
  loadMountsSilent();

  const dropZone = document.getElementById('dropZone');
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    handleFiles(e.dataTransfer.files);
  });
}

function renderDrives() {
  const container = document.getElementById('driveList');
  const personal = `
    <div class="drive-item${state.currentShare === 'personal' ? ' active' : ''}" onclick="selectPersonalDrive()">
      <div class="drive-icon personal">👤</div>
      <div class="drive-info">
        <div class="drive-name">个人网盘</div>
        <div class="drive-label">1TB 私有空间</div>
      </div>
    </div>
  `;
  container.innerHTML = personal + shares.map(s => `
    <div class="drive-item${state.currentShare === s.key ? ' active' : ''}" onclick="selectDrive('${s.key}')">
      <div class="drive-icon ${s.cls}">${s.icon}</div>
      <div class="drive-info">
        <div class="drive-name">${s.key}</div>
        <div class="drive-label">${s.label}</div>
        <div class="drive-mounted" id="mounted_${s.key}"></div>
      </div>
    </div>
  `).join('');
}

async function selectDrive(key) {
  state.currentShare = key;
  state.currentPath = '';
  state.selectedFiles.clear();
  state.searchMode = false;
  renderDrives();
  loadUsage();
  await loadFiles();
}

async function selectPersonalDrive() {
  state.currentShare = 'personal';
  state.currentPath = '';
  state.selectedFiles.clear();
  state.searchMode = false;
  renderDrives();
  await loadPersonalUsage();
  await loadFiles();
}

async function loadFiles() {
  if (!state.currentShare) return;

  const listEl = document.getElementById('fileList');
  listEl.innerHTML = '<div class="empty-state"><div class="empty-icon">⏳</div><div class="empty-text">加载中...</div></div>';
  updateBreadcrumb();
  updateDeleteBtn();

  if (state.currentShare === 'personal') {
    await loadPersonalFiles();
    return;
  }

  try {
    const resp = await authFetch(`${API_BASE}/api/list/${state.currentShare}?path=${encodeURIComponent(state.currentPath)}`);
    if (resp.status === 401) { doLogout(); return; }
    if (!resp.ok) { showToast('加载失败', 'error'); return; }
    const data = await resp.json();
    if (data.error) { showToast(data.error, 'error'); return; }
    state.files = data.items || [];
    state.searchMode = false;
    renderFiles();
    updatePathInfo();
  } catch (e) {
    showToast('连接失败: ' + e.message, 'error');
  }
}

async function loadPersonalFiles() {
  try {
    const resp = await authFetch(`${API_BASE}/api/personal/list?path=${encodeURIComponent(state.currentPath)}`);
    if (resp.status === 401) { doLogout(); return; }
    if (!resp.ok) { showToast('加载失败', 'error'); return; }
    const data = await resp.json();
    if (data.error) { showToast(data.error, 'error'); return; }
    state.files = data.items || [];
    state.searchMode = false;
    renderFiles();
    updatePathInfo();
  } catch (e) {
    showToast('连接失败: ' + e.message, 'error');
  }
}

function renderFiles() {
  const listEl = document.getElementById('fileList');

  if (state.files.length === 0) {
    listEl.innerHTML = '<div class="empty-state"><div class="empty-icon">📂</div><div class="empty-text">此目录为空</div></div>';
    return;
  }

  const getIcon = (item) => {
    if (item.type === 'folder') return '📁';
    const ext = item.name.split('.').pop()?.toLowerCase();
    const icons = {
      pdf:'📄',doc:'📝',docx:'📝',xls:'📊',xlsx:'📊',ppt:'📽',pptx:'📽',
      jpg:'🖼',jpeg:'🖼',png:'🖼',gif:'🖼',webp:'🖼',svg:'🖼',bmp:'🖼',
      mp4:'🎬',avi:'🎬',mkv:'🎬',mov:'🎬',wmv:'🎬',
      mp3:'🎵',wav:'🎵',flac:'🎵',aac:'🎵',
      zip:'📦',rar:'📦','7z':'📦',tar:'📦',gz:'📦',
      exe:'⚙',dmg:'⚙',iso:'💿',msi:'⚙',
      txt:'📃',md:'📃',json:'📃',xml:'📃',csv:'📃',log:'📃',
      py:'🐍',js:'📜',html:'🌐',css:'🎨',java:'☕',cpp:'⚡',ts:'📜',
    };
    return icons[ext] || '📎';
  };

  const shareTag = (item) => {
    if (state.searchMode && item.share && item.share !== state.currentShare) {
      return `<span class="file-share-tag">[${item.share_label || item.share}]</span>`;
    }
    return '';
  };

  listEl.innerHTML = `
    <table class="file-table">
      <thead><tr>
        <th style="width:30px"></th>
        <th>名称</th>
        <th style="width:130px">修改时间</th>
        <th style="width:100px">大小</th>
        <th style="width:130px">操作</th>
      </tr></thead>
      <tbody>
        ${state.files.map(f => {
          const checked = state.selectedFiles.has(f.name) ? 'checked' : '';
          const dblClick = f.type === 'folder'
            ? `enterFolder('${esc(f.name)}')`
            : `downloadFile('${esc(f.name)}')`;
          return `
            <tr class="file-row${checked ? ' selected' : ''}" ondblclick="${dblClick}">
              <td><input type="checkbox" ${checked} onclick="event.stopPropagation();toggleSelect('${esc(f.name)}')"></td>
              <td>
                <div class="file-name-cell">
                  <span class="file-icon">${getIcon(f)}</span>
                  <span class="file-name" title="${esc(f.name)}">${esc(f.name)}${shareTag(f)}</span>
                </div>
              </td>
              <td class="file-meta">${f.modified}</td>
              <td class="file-size">${f.size_str || '--'}</td>
              <td>
                <div class="file-actions">
                  ${f.type === 'folder'
                    ? `<button class="action-btn" onclick="event.stopPropagation();enterFolder('${esc(f.name)}')">打开</button>`
                    : `<button class="action-btn" onclick="event.stopPropagation();downloadFile('${esc(f.name)}')">下载</button>`
                  }
                  <button class="action-btn" onclick="event.stopPropagation();shareItem('${esc(f.name)}')">分享</button>
                  <button class="action-btn danger" onclick="event.stopPropagation();deleteItem('${esc(f.name)}')">删除</button>
                </div>
              </td>
            </tr>`;
        }).join('')}
      </tbody>
    </table>
  `;
}

function esc(str) {
  return str.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toggleSelect(name) {
  if (state.selectedFiles.has(name)) state.selectedFiles.delete(name);
  else state.selectedFiles.add(name);
  renderFiles();
  updateDeleteBtn();
}

function enterFolder(name) {
  state.currentPath = state.currentPath ? state.currentPath + '/' + name : name;
  state.selectedFiles.clear();
  state.searchMode = false;
  loadFiles();
}

function navigateTo(idx) {
  const parts = state.currentPath ? state.currentPath.split('/') : [];
  state.currentPath = parts.slice(0, idx + 1).join('/');
  state.selectedFiles.clear();
  state.searchMode = false;
  loadFiles();
}

function updateBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  const label = state.currentShare === 'personal' ? '个人网盘' : state.currentShare || '';
  let html = `<span class="breadcrumb-item" onclick="state.currentPath='';state.searchMode=false;loadFiles()">🏠 ${label}</span>`;
  if (state.currentPath) {
    const parts = state.currentPath.split('/');
    parts.forEach((p, i) => {
      html += `<span class="breadcrumb-sep">/</span><span class="breadcrumb-item" onclick="navigateTo(${i})">${esc(p)}</span>`;
    });
  }
  if (state.searchMode) html += ' <span style="font-size:11px;color:#fbbf24;margin-left:8px">[搜索结果]</span>';
  bc.innerHTML = html;
}

function updatePathInfo() {
  document.getElementById('pathInfo').textContent = state.currentPath ? `/${state.currentPath}` : '/';
}

function updateDeleteBtn() {
  document.getElementById('deleteBtn').disabled = state.selectedFiles.size === 0;
}

function refreshList() {
  state.searchMode = false;
  loadFiles();
}

// ==================== 全局搜索 ====================

async function startGlobalSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) { showToast('请输入搜索关键词', 'info'); return; }

  const listEl = document.getElementById('fileList');
  listEl.innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-text">正在搜索...</div></div>';

  if (state.currentShare === 'personal') {
    try {
      const resp = await authFetch(`${API_BASE}/api/personal/search?q=${encodeURIComponent(q)}`);
      if (resp.status === 401) { doLogout(); return; }
      const data = await resp.json();
      state.files = data.items || [];
      state.searchMode = true;
      state.currentPath = '';
      state.selectedFiles.clear();
      renderFiles();
      updateBreadcrumb();
      updatePathInfo();
      showToast(state.files.length === 0 ? '未找到匹配的文件' : `找到 ${state.files.length} 个结果`, 'success');
    } catch (e) { showToast('搜索失败', 'error'); }
    return;
  }

  try {
    const resp = await authFetch(`${API_BASE}/api/search_all?q=${encodeURIComponent(q)}`);
    if (resp.status === 401) { doLogout(); return; }
    const data = await resp.json();
    state.files = data.items || [];
    state.searchMode = true;
    state.currentPath = '';
    state.selectedFiles.clear();
    renderFiles();
    updateBreadcrumb();
    updatePathInfo();
    if (state.files.length === 0) {
      showToast('未找到匹配的文件', 'info');
    } else {
      showToast(`找到 ${state.files.length} 个结果`, 'success');
    }
  } catch (e) {
    showToast('搜索失败', 'error');
  }
}

// ==================== 高级查找 ====================

function showFindModal() {
  if (!state.currentShare) { showToast('请先选择一个盘符', 'error'); return; }
  const sel = document.getElementById('findShare');
  if (state.currentShare === 'personal') {
    sel.innerHTML = '<option value="personal" selected>个人网盘</option>';
  } else {
    sel.innerHTML = shares.map(s =>
      `<option value="${s.key}"${s.key === state.currentShare ? ' selected' : ''}>${s.key} - ${s.label}</option>`
    ).join('');
  }
  document.getElementById('findName').value = document.getElementById('searchInput').value || '';
  document.getElementById('findExt').value = '';
  document.getElementById('findMinSize').value = '';
  document.getElementById('findMaxSize').value = '';
  document.getElementById('findAfter').value = '';
  document.getElementById('findBefore').value = '';
  document.getElementById('findType').value = '';
  document.getElementById('findModal').style.display = 'flex';
}

async function execFind() {
  const share = document.getElementById('findShare').value;
  const params = new URLSearchParams();
  const name = document.getElementById('findName').value.trim();
  const ext = document.getElementById('findExt').value.trim();
  const ftype = document.getElementById('findType').value;
  const minSize = document.getElementById('findMinSize').value.trim();
  const maxSize = document.getElementById('findMaxSize').value.trim();
  const after = document.getElementById('findAfter').value.trim();
  const before = document.getElementById('findBefore').value.trim();

  if (name) params.set('name_contains', name);
  if (ext) params.set('ext', ext);
  if (ftype) params.set('file_type', ftype);
  if (minSize) params.set('min_size', parseInt(minSize) * 1048576);
  if (maxSize) params.set('max_size', parseInt(maxSize) * 1048576);
  if (after) params.set('modified_after', after);
  if (before) params.set('modified_before', before);
  params.set('limit', '200');

  closeModal('findModal');

  state.currentShare = share;
  state.currentPath = '';
  state.selectedFiles.clear();
  state.searchMode = true;

  const listEl = document.getElementById('fileList');
  listEl.innerHTML = '<div class="empty-state"><div class="empty-icon">🔎</div><div class="empty-text">查找中...</div></div>';
  updateBreadcrumb();

  const apiUrl = share === 'personal'
    ? `${API_BASE}/api/personal/search?${params.toString()}`
    : `${API_BASE}/api/find/${share}?${params.toString()}`;

  try {
    const resp = await authFetch(apiUrl);
    if (resp.status === 401) { doLogout(); return; }
    const data = await resp.json();
    state.files = data.items || [];
    renderFiles();
    updatePathInfo();
    showToast(`找到 ${data.count || state.files.length} 个结果`, 'success');
  } catch (e) {
    showToast('查找失败', 'error');
  }
}

// ==================== 下载 ====================

function downloadFile(name) {
  const fullPath = state.currentPath ? state.currentPath + '/' + name : name;
  if (state.currentShare === 'personal') {
    window.open(`${API_BASE}/api/personal/download?path=${encodeURIComponent(fullPath)}`, '_blank');
    return;
  }
  window.open(`${API_BASE}/api/download/${state.currentShare}?path=${encodeURIComponent(fullPath)}`, '_blank');
}

// ==================== 删除 ====================

async function deleteItem(name) {
  if (!confirm(`确定要删除 "${name}" 吗？此操作不可撤销。`)) return;
  const fullPath = state.currentPath ? state.currentPath + '/' + name : name;

  const apiUrl = state.currentShare === 'personal'
    ? `${API_BASE}/api/personal/delete?path=${encodeURIComponent(fullPath)}`
    : `${API_BASE}/api/delete/${state.currentShare}?path=${encodeURIComponent(fullPath)}`;

  try {
    const resp = await authFetch(apiUrl, { method: 'DELETE' });
    if (resp.status === 401) { doLogout(); return; }
    if (resp.ok) {
      showToast(`已删除: ${name}`, 'success');
      loadFiles();
    } else {
      const err = await resp.json();
      showToast('删除失败: ' + err.error, 'error');
    }
  } catch (e) {
    showToast('删除失败', 'error');
  }
}

async function deleteSelected() {
  if (state.selectedFiles.size === 0) return;
  if (!confirm(`确定要删除 ${state.selectedFiles.size} 个项目吗？`)) return;
  let ok = 0;
  for (const name of state.selectedFiles) {
    const p = state.currentPath ? state.currentPath + '/' + name : name;
    const apiUrl = state.currentShare === 'personal'
      ? `${API_BASE}/api/personal/delete?path=${encodeURIComponent(p)}`
      : `${API_BASE}/api/delete/${state.currentShare}?path=${encodeURIComponent(p)}`;
    try { const r = await authFetch(apiUrl, { method: 'DELETE' }); if (r.ok) ok++; } catch (e) {}
  }
  showToast(`已删除 ${ok}/${state.selectedFiles.size}`, 'success');
  state.selectedFiles.clear();
  loadFiles();
}

// ==================== 上传 ====================

function showUploadModal() {
  if (!state.currentShare) { showToast('请先选择一个盘符', 'error'); return; }
  const label = state.currentShare === 'personal'
    ? '个人网盘' + (state.currentPath ? '/' + state.currentPath : '/')
    : state.currentShare + (state.currentPath ? '/' + state.currentPath : '/');
  document.getElementById('uploadPathLabel').textContent = label;
  document.getElementById('uploadModal').style.display = 'flex';
  document.getElementById('uploadProgress').classList.remove('show');
  document.getElementById('uploadProgress').innerHTML = '';
  document.getElementById('uploadBtn').disabled = true;
  state.pendingFiles = [];
  document.getElementById('fileInput').value = '';
}

function handleFileSelect(event) { handleFiles(event.target.files); }
function handleFiles(fileList) {
  state.pendingFiles = Array.from(fileList);
  document.getElementById('uploadBtn').disabled = state.pendingFiles.length === 0;
}

async function startUpload() {
  if (state.pendingFiles.length === 0) return;
  const pd = document.getElementById('uploadProgress');
  pd.classList.add('show');
  pd.innerHTML = state.pendingFiles.map(f =>
    `<div class="progress-item"><span class="progress-name">${f.name}</span><div class="progress-bar-bg"><div class="progress-bar-fill" id="p_${cleanId(f.name)}" style="width:0%"></div></div><span class="progress-status" id="s_${cleanId(f.name)}">等待</span></div>`
  ).join('');
  document.getElementById('uploadBtn').disabled = true;

  const fd = new FormData();
  state.pendingFiles.forEach(f => fd.append('files', f));

  const apiUrl = state.currentShare === 'personal'
    ? `${API_BASE}/api/personal/upload?path=${encodeURIComponent(state.currentPath)}`
    : `${API_BASE}/api/upload/${state.currentShare}?path=${encodeURIComponent(state.currentPath)}`;

  try {
    const resp = await authFetch(apiUrl, { method: 'POST', body: fd });
    if (resp.status === 401) { doLogout(); return; }
    const result = await resp.json();
    state.pendingFiles.forEach(f => {
      const id = cleanId(f.name);
      const bar = document.getElementById('p_' + id);
      const st = document.getElementById('s_' + id);
      if (result.uploaded && result.uploaded.includes(f.name)) {
        if (bar) bar.style.width = '100%';
        if (st) { st.textContent = '完成'; st.style.color = '#4ade80'; }
      } else {
        if (st) { st.textContent = '失败'; st.style.color = '#f87171'; }
      }
    });
    showToast(`上传完成: ${result.uploaded ? result.uploaded.length : 0} 成功`, 'success');
    setTimeout(() => { closeModal('uploadModal'); loadFiles(); }, 1500);
  } catch (e) {
    showToast('上传失败: ' + e.message, 'error');
  }
}

function cleanId(name) { return name.replace(/[^a-zA-Z0-9\u4e00-\u9fff]/g, '_'); }

// ==================== 新建文件夹 ====================

function showMkdirModal() {
  if (!state.currentShare) { showToast('请先选择一个盘符', 'error'); return; }
  document.getElementById('mkdirModal').style.display = 'flex';
  document.getElementById('mkdirName').value = '';
  setTimeout(() => document.getElementById('mkdirName').focus(), 100);
}

async function createFolder() {
  const name = document.getElementById('mkdirName').value.trim();
  if (!name) { showToast('请输入文件夹名称', 'error'); return; }

  const apiUrl = state.currentShare === 'personal'
    ? `${API_BASE}/api/personal/mkdir?path=${encodeURIComponent(state.currentPath)}&name=${encodeURIComponent(name)}`
    : `${API_BASE}/api/mkdir/${state.currentShare}?path=${encodeURIComponent(state.currentPath)}&name=${encodeURIComponent(name)}`;

  try {
    const resp = await authFetch(apiUrl, { method: 'POST' });
    if (resp.status === 401) { doLogout(); return; }
    if (resp.ok) {
      showToast(`已创建: ${name}`, 'success');
      closeModal('mkdirModal');
      loadFiles();
    } else {
      const err = await resp.json();
      showToast('创建失败: ' + err.error, 'error');
    }
  } catch (e) { showToast('创建失败', 'error'); }
}

// ==================== 挂载管理 ====================

async function showMountModal() {
  document.getElementById('mountModal').style.display = 'flex';
  await loadMounts();
}

async function loadMountsSilent() {
  try {
    const resp = await authFetch(`${API_BASE}/api/mounts`);
    if (resp.status === 401) { doLogout(); return; }
    const data = await resp.json();
    for (const m of data.mounts || []) {
      const el = document.getElementById('mounted_' + m.share);
      if (el) { el.textContent = '已挂载: ' + m.drive; el.classList.add('show'); }
    }
  } catch (e) {}
}

async function loadMounts() {
  const container = document.getElementById('mountList');
  container.innerHTML = '<div style="padding:8px;color:rgba(255,255,255,0.3)">加载中...</div>';
  try {
    const resp = await authFetch(`${API_BASE}/api/mounts`);
    if (resp.status === 401) { doLogout(); return; }
    const data = await resp.json();
    const mounts = data.mounts || [];
    if (mounts.length === 0) {
      container.innerHTML = '<div style="padding:16px;text-align:center;color:rgba(255,255,255,0.25)">暂无挂载的盘符</div>';
    } else {
      container.innerHTML = mounts.map(m => `
        <div class="mount-list-item">
          <div class="mount-info">
            <span class="mount-drive">${m.drive}</span>
            <span class="mount-arrow">→</span>
            <span><strong>${m.share}</strong> <span style="font-size:11px;color:rgba(255,255,255,0.3)">${m.label || ''}</span></span>
          </div>
          <button class="action-btn danger" onclick="unmountDrive('${m.share}')">断开</button>
        </div>
      `).join('');
    }

    const mountedShares = new Set(mounts.map(m => m.share));
    const unmounted = shares.filter(s => !mountedShares.has(s.key));
    if (unmounted.length > 0) {
      container.innerHTML += `
        <div style="margin-top:14px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.06)">
          <div style="font-size:12px;color:rgba(255,255,255,0.3);margin-bottom:8px">可挂载的盘符</div>
          ${unmounted.map(s => `
            <div class="mount-list-item" style="justify-content:space-between">
              <div class="mount-info"><span style="font-size:14px;font-weight:600">${s.key}</span> <span style="font-size:11px;color:rgba(255,255,255,0.35)">${s.label}</span></div>
              <button class="btn btn-accent btn-sm" onclick="mountDrive('${s.key}')">挂载</button>
            </div>
          `).join('')}
        </div>`;
    }
  } catch (e) {
    container.innerHTML = '<div style="padding:8px;color:#f87171">加载失败</div>';
  }
}

async function mountDrive(share) {
  showToast(`正在挂载 ${share}...`, 'info');
  try {
    const resp = await authFetch(`${API_BASE}/api/mount/${share}`, { method: 'POST' });
    if (resp.status === 401) { doLogout(); return; }
    const data = await resp.json();
    if (data.success) {
      showToast(data.message, 'success');
      loadMounts();
      const el = document.getElementById('mounted_' + share);
      if (el) { el.textContent = '已挂载: ' + data.drive; el.classList.add('show'); }
    } else {
      showToast(data.error || '挂载失败', 'error');
    }
  } catch (e) {
    showToast('挂载失败: ' + e.message, 'error');
  }
}

async function unmountDrive(share) {
  if (!confirm(`确定断开 ${share} 的挂载吗？`)) return;
  try {
    const resp = await authFetch(`${API_BASE}/api/mount/${share}`, { method: 'DELETE' });
    if (resp.status === 401) { doLogout(); return; }
    const data = await resp.json();
    if (data.success) {
      showToast(data.message, 'success');
      loadMounts();
      const el = document.getElementById('mounted_' + share);
      if (el) { el.textContent = ''; el.classList.remove('show'); }
    } else {
      showToast(data.error || '断开失败', 'error');
    }
  } catch (e) {
    showToast('断开失败', 'error');
  }
}

// ==================== 刷新服务器 ====================

async function refreshAll() {
  showToast('正在刷新所有服务器连接...', 'info');
  try {
    const resp = await authFetch(`${API_BASE}/api/refresh_all`, { method: 'POST' });
    if (resp.status === 401) { doLogout(); return; }
    const data = await resp.json();
    const results = data.results || {};
    const lines = Object.entries(results).map(([k, v]) => `${k}: ${v === '已连接' ? '✓' : '✗'}`);
    showToast('刷新完成: ' + lines.join(' | '), data.all_ok ? 'success' : 'error');
    loadUsage();
    if (state.currentShare) loadFiles();
  } catch (e) {
    showToast('刷新失败: ' + e.message, 'error');
  }
}

// ==================== 容量 ====================

async function loadUsage() {
  if (!state.token) return;
  try {
    const resp = await authFetch(`${API_BASE}/api/usage`);
    if (resp.status === 401) { doLogout(); return; }
    const data = await resp.json();
    const pct = data.percent > 0 ? `${data.percent}%` : '--';
    document.getElementById('usagePercent').textContent = pct;
    document.getElementById('usageBar').style.width = data.percent > 0 ? `${data.percent}%` : '0%';
    document.getElementById('usageDetail').innerHTML = `已用 ${data.used_str}<br>共 ${data.total_str}`;
  } catch (e) {
    document.getElementById('usageDetail').textContent = '获取中...';
  }
}

async function loadPersonalUsage() {
  try {
    const resp = await authFetch(`${API_BASE}/api/personal/usage`);
    if (resp.status === 401) { doLogout(); return; }
    const data = await resp.json();
    const pct = data.percent > 0 ? `${data.percent}%` : '--';
    document.getElementById('usagePercent').textContent = pct;
    document.getElementById('usageBar').style.width = data.percent > 0 ? `${data.percent}%` : '0%';
    document.getElementById('usageDetail').innerHTML = `已用 ${data.used_str}<br>共 ${data.total_str}`;
  } catch (e) {
    document.getElementById('usageDetail').textContent = '获取中...';
  }
}

// ==================== 分享功能 ====================

async function shareItem(name) {
  if (!state.currentShare) return;
  showToast('正在创建分享...', 'info');
  
  const fullPath = state.currentPath ? state.currentPath + '/' + name : name;
  const shareType = state.currentShare === 'personal' ? 'personal' : 'shared';
  const shareName = shareType === 'personal' ? '' : state.currentShare;

  const form = new URLSearchParams();
  form.append('share_type', shareType);
  if (shareName) form.append('share_name', shareName);
  form.append('path', fullPath);

  try {
    const resp = await authFetch(`${API_BASE}/api/share/create`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: form.toString()
    });
    if (resp.status === 401) { doLogout(); return; }
    const data = await resp.json();
    if (data.link) {
      showShareResult(data);
    } else {
      showToast('分享失败: ' + (data.error || '未知错误'), 'error');
    }
  } catch (e) {
    showToast('分享失败: ' + e.message, 'error');
  }
}

function showShareResult(data) {
  document.getElementById('shareFileName').textContent = data.file_name + (data.is_folder ? '（文件夹）' : '');
  document.getElementById('shareFileSize').textContent = data.file_size_str;
  document.getElementById('shareLinkInput').value = data.link;
  document.getElementById('copyHint').style.opacity = '0';
  document.getElementById('shareResultModal').style.display = 'flex';
}

function copyShareLink() {
  const input = document.getElementById('shareLinkInput');
  input.select();
  input.setSelectionRange(0, 99999);
  try {
    navigator.clipboard.writeText(input.value);
    const hint = document.getElementById('copyHint');
    hint.style.opacity = '1';
    setTimeout(() => hint.style.opacity = '0', 2000);
  } catch (e) {
    showToast('复制失败，请手动复制', 'error');
  }
}

function showShareManageModal() {
  document.getElementById('shareManageModal').style.display = 'flex';
  loadShares();
}

async function loadShares() {
  const container = document.getElementById('shareListContainer');
  container.innerHTML = '<div style="padding:20px;text-align:center;color:rgba(255,255,255,0.3)">加载中...</div>';
  
  try {
    const resp = await authFetch(`${API_BASE}/api/share/list`);
    if (resp.status === 401) { doLogout(); return; }
    const data = await resp.json();
    const items = data.items || [];
    
    if (items.length === 0) {
      container.innerHTML = '<div style="padding:40px;text-align:center;color:rgba(255,255,255,0.2)"><div style="font-size:48px;margin-bottom:12px">🔗</div><div>暂无分享链接</div></div>';
      return;
    }
    
    container.innerHTML = `
      <div style="max-height:50vh;overflow-y:auto;margin:-12px -24px 0;padding:12px 24px">
        <table style="width:100%;border-collapse:collapse">
          <thead>
            <tr style="border-bottom:1px solid rgba(255,255,255,0.05)">
              <th style="text-align:left;padding:8px 12px;font-size:11px;color:rgba(255,255,255,0.3)">文件</th>
              <th style="text-align:left;padding:8px 12px;font-size:11px;color:rgba(255,255,255,0.3)">大小</th>
              <th style="text-align:left;padding:8px 12px;font-size:11px;color:rgba(255,255,255,0.3)">创建时间</th>
              <th style="text-align:left;padding:8px 12px;font-size:11px;color:rgba(255,255,255,0.3)">下载</th>
              <th style="text-align:left;padding:8px 12px;font-size:11px;color:rgba(255,255,255,0.3)">操作</th>
            </tr>
          </thead>
          <tbody>
            ${items.map(item => `
              <tr style="border-bottom:1px solid rgba(255,255,255,0.03)">
                <td style="padding:12px 12px;font-size:13px">
                  <div style="display:flex;align-items:flex-start;gap:8px">
                    <span style="font-size:16px">${item.is_folder ? '📁' : '📄'}</span>
                    <div>
                      <div style="font-weight:500;color:#e0e0e0">${esc(item.file_name)}${item.is_folder ? '（文件夹）' : ''}</div>
                      <div style="font-size:11px;color:rgba(255,255,255,0.4);margin-top:2px">
                        <a href="${item.link}" target="_blank" style="color:#818cf8;text-decoration:none">${item.link.replace('http://192.168.1.23:8889/s/', '.../s/')}</a>
                      </div>
                    </div>
                  </div>
                </td>
                <td style="padding:12px 12px;font-size:12px;color:rgba(255,255,255,0.5)">${item.file_size_str}</td>
                <td style="padding:12px 12px;font-size:12px;color:rgba(255,255,255,0.5)">${item.created_at}</td>
                <td style="padding:12px 12px;font-size:12px;color:rgba(255,255,255,0.5)">${item.downloads}</td>
                <td style="padding:12px 12px">
                  <button class="action-btn" onclick="copyShareLinkText('${item.link}')" style="padding:4px 10px">复制</button>
                  <button class="action-btn danger" onclick="revokeShare('${item.share_id}')" style="padding:4px 10px">撤销</button>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    `;
  } catch (e) {
    container.innerHTML = '<div style="padding:20px;text-align:center;color:#f87171">加载失败: ' + e.message + '</div>';
  }
}

function copyShareLinkText(link) {
  try {
    navigator.clipboard.writeText(link);
    showToast('链接已复制到剪贴板', 'success');
  } catch (e) {
    showToast('复制失败，请手动复制', 'error');
  }
}

async function revokeShare(shareId) {
  if (!confirm('确定要撤销此分享吗？链接将立即失效。')) return;
  
  try {
    const resp = await authFetch(`${API_BASE}/api/share/revoke/${shareId}`, { method: 'DELETE' });
    if (resp.status === 401) { doLogout(); return; }
    if (resp.ok) {
      showToast('分享已撤销', 'success');
      loadShares();
    } else {
      const err = await resp.json();
      showToast('撤销失败: ' + err.error, 'error');
    }
  } catch (e) {
    showToast('撤销失败: ' + e.message, 'error');
  }
}

// ==================== 工具 ====================

function closeModal(id) { document.getElementById(id).style.display = 'none'; }
function showToast(msg, type) {
  const toast = document.createElement('div');
  toast.className = `toast ${type || 'info'}`;
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3500);
}

document.addEventListener('click', e => {
  if (e.target.classList.contains('modal-overlay')) e.target.style.display = 'none';
});

checkLogin();
</script>
