<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>自在Agent</title>
<style>
  /* ============================================================
     Apple 液态玻璃效果 (Glassmorphism) + 深色主题
  ============================================================ */
  :root {
    --bg-primary: #0a0a0f;
    --bg-surface: rgba(255, 255, 255, 0.04);
    --glass-bg: rgba(255, 255, 255, 0.06);
    --glass-border: rgba(255, 255, 255, 0.08);
    --glass-highlight: rgba(255, 255, 255, 0.12);
    --text-primary: #f5f5f7;
    --text-secondary: #a1a1a6;
    --text-tertiary: #636366;
    --accent: #007aff;
    --accent-glow: rgba(0, 122, 255, 0.3);
    --user-bubble: rgba(0, 122, 255, 0.15);
    --user-border: rgba(0, 122, 255, 0.25);
    --ai-bubble: rgba(255, 255, 255, 0.05);
    --ai-border: rgba(255, 255, 255, 0.08);
    --danger: #ff453a;
    --radius-sm: 12px;
    --radius-md: 18px;
    --radius-lg: 24px;
    --radius-xl: 28px;
    --transition: 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
    --font-sans: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI",
                 "PingFang SC", "Microsoft YaHei", sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font-sans);
    background: var(--bg-primary);
    color: var(--text-primary);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* 背景动态光晕 */
  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background:
      radial-gradient(ellipse 600px 600px at 20% 30%, rgba(0, 122, 255, 0.08), transparent),
      radial-gradient(ellipse 500px 500px at 80% 70%, rgba(175, 82, 222, 0.06), transparent),
      radial-gradient(ellipse 400px 400px at 50% 50%, rgba(255, 149, 0, 0.04), transparent);
    z-index: 0;
    pointer-events: none;
    animation: bgFloat 20s ease-in-out infinite;
  }
  @keyframes bgFloat {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    33% { transform: translate(30px, -20px) rotate(1deg); }
    66% { transform: translate(-20px, 30px) rotate(-1deg); }
  }

  /* ========== 主容器 ========== */
  .app-container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 800px;
    height: 92vh;
    max-height: 900px;
    display: flex;
    flex-direction: column;
    background: var(--glass-bg);
    backdrop-filter: blur(40px) saturate(180%);
    -webkit-backdrop-filter: blur(40px) saturate(180%);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-xl);
    box-shadow:
      0 8px 32px rgba(0, 0, 0, 0.4),
      inset 0 1px 0 var(--glass-highlight);
    overflow: hidden;
  }

  /* ========== 顶部标题栏 ========== */
  .header {
    flex-shrink: 0;
    padding: 20px 28px;
    display: flex;
    align-items: center;
    gap: 14px;
    border-bottom: 1px solid var(--glass-border);
    background: rgba(255, 255, 255, 0.02);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    user-select: none;
  }
  .header-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), #5856d6);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    box-shadow: 0 0 20px var(--accent-glow);
    flex-shrink: 0;
  }
  .header-info h2 {
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.2px;
    line-height: 1.3;
  }
  .header-info span {
    font-size: 12px;
    color: #34c759;
    letter-spacing: 0.3px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .header-info span::before {
    content: '';
    display: inline-block;
    width: 7px;
    height: 7px;
    background: #34c759;
    border-radius: 50%;
    box-shadow: 0 0 6px #34c759;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* ========== 消息列表 ========== */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar {
    width: 4px;
  }
  .messages::-webkit-scrollbar-track {
    background: transparent;
  }
  .messages::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.1);
    border-radius: 4px;
  }

  /* 拖拽高亮 */
  .messages.drag-over {
    background: rgba(0, 122, 255, 0.06);
    box-shadow: inset 0 0 0 2px rgba(0, 122, 255, 0.3);
  }

  /* 欢迎消息 */
  .welcome-card {
    align-self: center;
    text-align: center;
    padding: 32px 24px;
    margin: 20px 0;
    background: var(--glass-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-lg);
    max-width: 420px;
  }
  .welcome-card .icon {
    font-size: 48px;
    margin-bottom: 12px;
    filter: drop-shadow(0 0 20px var(--accent-glow));
  }
  .welcome-card h3 {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 6px;
    letter-spacing: -0.3px;
  }
  .welcome-card p {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.6;
  }

  /* 消息气泡 */
  .message {
    max-width: 78%;
    padding: 14px 18px;
    border-radius: var(--radius-md);
    font-size: 14.5px;
    line-height: 1.65;
    word-break: break-word;
    position: relative;
    animation: msgIn 0.35s cubic-bezier(0.25, 0.1, 0.25, 1);
    letter-spacing: 0.1px;
  }
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(12px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* 用户消息 */
  .message.user {
    align-self: flex-end;
    background: var(--user-bubble);
    border: 1px solid var(--user-border);
    border-radius: var(--radius-md) var(--radius-md) 6px var(--radius-md);
    color: var(--text-primary);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }

  /* AI 消息 */
  .message.ai {
    align-self: flex-start;
    background: var(--ai-bubble);
    border: 1px solid var(--ai-border);
    border-radius: var(--radius-md) var(--radius-md) var(--radius-md) 6px;
    color: var(--text-primary);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }

  /* 加载动画 */
  .message.ai.typing {
    padding: 18px 22px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .typing-dots {
    display: flex;
    gap: 5px;
    align-items: center;
  }
  .typing-dots span {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--text-secondary);
    animation: typingDot 1.4s ease-in-out infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typingDot {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-8px); opacity: 1; }
  }

  /* 时间戳 */
  .timestamp {
    font-size: 10px;
    color: var(--text-tertiary);
    margin-top: 4px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .message:hover .timestamp {
    opacity: 1;
  }
  .message.user .timestamp { text-align: right; }
  .message.ai .timestamp { text-align: left; }

  /* ========== 附件预览区 ========== */
  .attachment-preview {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 8px 14px;
    border-top: 1px solid var(--glass-border);
    max-height: 120px;
    overflow-y: auto;
  }
  .attachment-preview:empty {
    display: none;
  }
  .attachment-item {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 8px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-sm);
    font-size: 12px;
    color: var(--text-secondary);
    max-width: 180px;
    animation: msgIn 0.3s ease;
  }
  .attachment-item .thumb {
    width: 32px;
    height: 32px;
    border-radius: 6px;
    object-fit: cover;
    flex-shrink: 0;
  }
  .attachment-item .file-icon {
    width: 32px;
    height: 32px;
    border-radius: 6px;
    background: rgba(255, 255, 255, 0.06);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }
  .attachment-item .file-name {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
  }
  .attachment-item .remove-btn {
    position: absolute;
    top: -6px;
    right: -6px;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: rgba(255, 69, 58, 0.8);
    border: none;
    color: #fff;
    font-size: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .attachment-item:hover .remove-btn {
    opacity: 1;
  }

  /* 消息气泡中的附件 */
  .bubble-attachments {
    margin-bottom: 8px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .bubble-attachment-img {
    max-width: 200px;
    max-height: 160px;
    border-radius: var(--radius-sm);
    object-fit: cover;
    cursor: pointer;
    border: 1px solid var(--glass-border);
  }
  .bubble-attachment-file {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-sm);
    font-size: 12px;
    color: var(--text-secondary);
    cursor: pointer;
    text-decoration: none;
  }
  .bubble-attachment-file:hover {
    background: rgba(255, 255, 255, 0.08);
  }

  /* ========== 输入区域 ========== */
  .input-area {
    flex-shrink: 0;
    padding: 16px 20px 20px;
    border-top: 1px solid var(--glass-border);
    background: rgba(255, 255, 255, 0.02);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }
  .input-wrapper {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-lg);
    padding: 6px 6px 6px 10px;
    transition: border-color var(--transition), box-shadow var(--transition);
  }
  .input-wrapper:focus-within {
    border-color: rgba(0, 122, 255, 0.4);
    box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.1);
  }

  /* 上传按钮 */
  .upload-btn {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    border: none;
    background: transparent;
    color: var(--text-secondary);
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all var(--transition);
  }
  .upload-btn:hover {
    color: var(--text-primary);
    background: rgba(255, 255, 255, 0.06);
  }
  .upload-btn.uploading {
    opacity: 0.5;
    pointer-events: none;
  }

  .input-wrapper textarea {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text-primary);
    font-family: var(--font-sans);
    font-size: 14.5px;
    resize: none;
    padding: 8px 0;
    max-height: 120px;
    line-height: 1.5;
    letter-spacing: 0.1px;
  }
  .input-wrapper textarea::placeholder {
    color: var(--text-tertiary);
  }
  .input-wrapper textarea::-webkit-scrollbar {
    width: 3px;
  }
  .input-wrapper textarea::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.08);
    border-radius: 2px;
  }

  .send-btn {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    border: none;
    background: var(--accent);
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all var(--transition);
    box-shadow: 0 0 12px var(--accent-glow);
  }
  .send-btn:hover {
    background: #0070e9;
    box-shadow: 0 0 20px rgba(0, 122, 255, 0.5);
    transform: scale(1.04);
  }
  .send-btn:active {
    transform: scale(0.95);
  }
  .send-btn:disabled {
    background: rgba(255, 255, 255, 0.1);
    box-shadow: none;
    cursor: not-allowed;
    transform: none;
    color: var(--text-tertiary);
  }

  /* 底部提示文字 */
  .footer-hint {
    text-align: center;
    font-size: 11px;
    color: var(--text-tertiary);
    margin-top: 10px;
    user-select: none;
  }

  /* ========== 响应式 ========== */
  @media (max-width: 640px) {
    .app-container {
      height: 100vh;
      max-height: none;
      border-radius: 0;
      max-width: none;
    }
    .header { padding: 16px 20px; }
    .messages { padding: 16px; }
    .input-area { padding: 12px 14px 16px; }
    .message { max-width: 88%; font-size: 14px; }
  }
</style>
</head>
<body>

<div class="app-container">
  <!-- 顶部标题栏 -->
  <div class="header">
    <img src="icon.png" alt="icon" class="header-avatar" style="width:40px;height:40px;border-radius:50%;object-fit:contain">
    <div class="header-info">
      <h2>自在Agent</h2>
      <span>在线 · DeepSeek驱动</span>
    </div>
  </div>

  <!-- 消息列表 -->
  <div class="messages" id="messages">
    <div class="welcome-card" id="welcomeCard">
      <img src="icon.png" alt="icon" class="icon" style="width:48px;height:48px;border-radius:50%;object-fit:contain;margin-bottom:12px">
      <h3>你好，我是自在Agent</h3>
      <p>你好我是自在Agent，可以帮你出策划，做格式转码，帮你处理文件，处理视频。</p>
    </div>
  </div>

  <!-- 输入区域 -->
  <div class="input-area">
    <!-- 附件预览条 -->
    <div class="attachment-preview" id="attachmentPreview"></div>
    <div class="input-wrapper">
      <!-- 上传按钮 -->
      <button class="upload-btn" id="uploadBtn" title="上传文件或图片">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
        </svg>
      </button>
      <input type="file" id="fileInput" multiple accept="image/*,.pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt,.csv,.md,.json,.zip,.rar,.7z" style="display:none">
      <textarea
        id="messageInput"
        placeholder="输入你的消息... 也可以拖拽文件到对话区域"
        rows="1"
        maxlength="2000"
      ></textarea>
      <button class="send-btn" id="sendBtn" title="发送 (Enter)">
        &#x2191;
      </button>
    </div>
    <div class="footer-hint">自在Agent · DeepSeek驱动 · 按 Enter 发送，Shift+Enter 换行 · @杭州自在空间文化艺术有限公司</div>
  </div>
</div>

<script>
// ============================================================
// 前端交互逻辑
// ============================================================
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('messageInput');
const sendBtn = document.getElementById('sendBtn');
const welcomeCard = document.getElementById('welcomeCard');
const uploadBtn = document.getElementById('uploadBtn');
const fileInput = document.getElementById('fileInput');
const attachmentPreview = document.getElementById('attachmentPreview');

// 待发送的附件列表
let pendingFiles = [];
let isProcessing = false;

// 滚动到底部
function scrollToBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

// 获取当前时间字符串
function getTimeString() {
  const now = new Date();
  return `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
}

// 判断是否为图片类型
function isImageFile(file) {
  return file.type.startsWith('image/');
}

// 判断文件图标
function getFileIcon(file) {
  if (isImageFile(file)) return '';
  const ext = (file.name || '').split('.').pop().toLowerCase();
  const icons = {
    pdf: '&#x1F4C4;', doc: '&#x1F4DD;', docx: '&#x1F4DD;',
    xls: '&#x1F4CA;', xlsx: '&#x1F4CA;', ppt: '&#x1F4CA;', pptx: '&#x1F4CA;',
    txt: '&#x1F4C3;', md: '&#x1F4C3;', csv: '&#x1F4C8;',
    json: '&#x1F4BE;', zip: '&#x1F4E6;', rar: '&#x1F4E6;', '7z': '&#x1F4E6;'
  };
  return icons[ext] || '&#x1F4CE;';
}

// 为每个文件生成唯一ID
let fileIdCounter = 0;
function nextFileId() { return 'f' + (++fileIdCounter); }

// 渲染附件预览
function renderAttachmentPreview() {
  attachmentPreview.innerHTML = '';
  pendingFiles.forEach((pf, index) => {
    const item = document.createElement('div');
    item.className = 'attachment-item';

    if (pf.isImage && pf.previewUrl) {
      const img = document.createElement('img');
      img.className = 'thumb';
      img.src = pf.previewUrl;
      item.appendChild(img);
    } else {
      const icon = document.createElement('span');
      icon.className = 'file-icon';
      icon.innerHTML = pf.icon;
      item.appendChild(icon);
    }

    const name = document.createElement('span');
    name.className = 'file-name';
    name.textContent = pf.file.name;
    item.appendChild(name);

    const removeBtn = document.createElement('button');
    removeBtn.className = 'remove-btn';
    removeBtn.innerHTML = '&#x2715;';
    removeBtn.title = '移除';
    removeBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      // 释放预览URL
      if (pf.previewUrl) URL.revokeObjectURL(pf.previewUrl);
      pendingFiles.splice(index, 1);
      renderAttachmentPreview();
    });
    item.appendChild(removeBtn);

    attachmentPreview.appendChild(item);
  });
}

// 处理文件添加
function handleFiles(files) {
  if (!files || files.length === 0) return;

  for (const file of files) {
    const pf = {
      id: nextFileId(),
      file: file,
      isImage: isImageFile(file),
      icon: getFileIcon(file),
      previewUrl: null
    };

    if (pf.isImage) {
      pf.previewUrl = URL.createObjectURL(file);
    }

    pendingFiles.push(pf);
  }

  renderAttachmentPreview();
  inputEl.focus();
}

// 上传文件到服务器，返回文件信息
async function uploadFile(pf) {
  const file = pf.file;
  const textExts = ['txt', 'csv', 'md', 'json', 'xml', 'log', 'yaml', 'yml', 'py', 'js', 'ts', 'html', 'css'];
  const ext = (file.name || '').split('.').pop().toLowerCase();
  let content = null;

  if (textExts.includes(ext)) {
    try {
      content = await new Promise((resolve) => {
        const r = new FileReader();
        r.onload = () => resolve(r.result);
        r.readAsText(file);
      });
    } catch(e) {}
  }

  return {
    originalname: file.name,
    mimetype: file.type,
    size: file.size,
    content: content
  };
}

// 创建带附件的用户消息 DOM
function createUserMessageElement(text, uploadedFiles) {
  const wrapper = document.createElement('div');
  const bubble = document.createElement('div');
  bubble.className = 'message user';

  // 附件展示
  if (uploadedFiles && uploadedFiles.length > 0) {
    const attachDiv = document.createElement('div');
    attachDiv.className = 'bubble-attachments';

    uploadedFiles.forEach(uf => {
      if (uf.mimetype && uf.mimetype.startsWith('image/')) {
        const img = document.createElement('img');
        img.className = 'bubble-attachment-img';
        img.src = uf.url;
        img.alt = uf.originalname;
        img.title = uf.originalname;
        img.addEventListener('click', () => window.open(uf.url, '_blank'));
        attachDiv.appendChild(img);
      } else {
        const link = document.createElement('a');
        link.className = 'bubble-attachment-file';
        link.href = uf.url;
        link.target = '_blank';
        link.innerHTML = `${getIconByExt(uf.originalname)} ${uf.originalname}`;
        attachDiv.appendChild(link);
      }
    });

    bubble.appendChild(attachDiv);
  }

  // 文本内容
  if (text) {
    const textNode = document.createTextNode(text);
    bubble.appendChild(textNode);
  }

  const time = document.createElement('div');
  time.className = 'timestamp';
  time.textContent = getTimeString();

  wrapper.appendChild(bubble);
  wrapper.appendChild(time);
  return wrapper;
}

function getIconByExt(filename) {
  const ext = (filename || '').split('.').pop().toLowerCase();
  const icons = {
    pdf: '&#x1F4C4;', doc: '&#x1F4DD;', docx: '&#x1F4DD;',
    xls: '&#x1F4CA;', xlsx: '&#x1F4CA;', ppt: '&#x1F4CA;', pptx: '&#x1F4CA;',
    txt: '&#x1F4C3;', md: '&#x1F4C3;', csv: '&#x1F4C8;',
    json: '&#x1F4BE;', zip: '&#x1F4E6;', rar: '&#x1F4E6;', '7z': '&#x1F4E6;',
    jpg: '', jpeg: '', png: '', gif: '', webp: '', svg: ''
  };
  return icons[ext] || '&#x1F4CE;';
}

// 创建消息 DOM 元素（纯文本）
function createMessageElement(content, role, timestamp) {
  const wrapper = document.createElement('div');
  const bubble = document.createElement('div');
  bubble.className = `message ${role}`;
  bubble.textContent = content;

  const time = document.createElement('div');
  time.className = 'timestamp';
  time.textContent = timestamp;

  wrapper.appendChild(bubble);
  wrapper.appendChild(time);
  return wrapper;
}

// 移除欢迎卡片
function removeWelcomeCard() {
  if (welcomeCard) {
    welcomeCard.remove();
  }
}

// 创建 typing 指示器
function createTypingIndicator() {
  const wrapper = document.createElement('div');
  const bubble = document.createElement('div');
  bubble.className = 'message ai typing';
  bubble.id = 'typingIndicator';
  bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
  wrapper.appendChild(bubble);
  return wrapper;
}

// 移除 typing 指示器
function removeTypingIndicator() {
  const indicator = document.getElementById('typingIndicator');
  if (indicator) {
    indicator.parentElement.remove();
  }
}

// 发送消息
async function sendMessage() {
  const message = inputEl.value.trim();
  const hasFiles = pendingFiles.length > 0;

  if ((!message && !hasFiles) || isProcessing) return;

  isProcessing = true;
  sendBtn.disabled = true;
  uploadBtn.classList.add('uploading');
  inputEl.value = '';
  inputEl.style.height = 'auto';
  removeWelcomeCard();

  // 先上传所有文件
  let uploadedFiles = [];
  let uploadError = false;

  if (hasFiles) {
    try {
      for (let i = 0; i < pendingFiles.length; i++) {
        const pf = pendingFiles[i];
        const fileInfo = await uploadFile(pf);
        // 保留预览URL给图片展示用
        fileInfo.url = pf.previewUrl;
        uploadedFiles.push(fileInfo);
        if (pf.previewUrl) URL.revokeObjectURL(pf.previewUrl);
      }
    } catch (err) {
      console.error('文件上传失败:', err);
      uploadError = true;
    }
  }

  // 清空待发送附件
  pendingFiles = [];
  renderAttachmentPreview();

  if (uploadError) {
    messagesEl.appendChild(
      createMessageElement('文件上传失败，请稍后重试。', 'ai', getTimeString())
    );
    scrollToBottom();
    isProcessing = false;
    sendBtn.disabled = false;
    uploadBtn.classList.remove('uploading');
    inputEl.focus();
    return;
  }

  // 添加用户消息（含附件）
  messagesEl.appendChild(createUserMessageElement(message, uploadedFiles));
  scrollToBottom();

  // 添加 typing 指示器
  messagesEl.appendChild(createTypingIndicator());
  scrollToBottom();

  try {
    // 构建消息内容
    let userContent = message || '';
    if (uploadedFiles.length > 0) {
      const file = uploadedFiles[0];
      if (file.mimetype && file.mimetype.startsWith('image/')) {
        userContent = `[用户上传了图片: ${file.originalname}] ` + userContent;
      } else if (file.content) {
        userContent = `[用户上传了文件: ${file.originalname}]\n文件内容:\n${file.content}\n\n${userContent}`;
      } else {
        userContent = `[用户上传了文件: ${file.originalname}] ` + userContent;
      }
    }

    const response = await fetch('https://api.deepseek.com/chat/completions', {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer sk-79069d909bee461582be22ea452626ec',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        model: 'deepseek-chat',
        messages: [
          { role: 'system', content: '你叫自在Agent，是杭州自在空间文化艺术有限公司的AI助手。回复简洁、友好、有帮助，用中文回答。' },
          { role: 'user', content: userContent }
        ],
        max_tokens: 1000,
        temperature: 0.7,
        stream: false
      })
    });

    if (!response.ok) {
      throw new Error(`HTTP ${response.status}`);
    }

    const data = await response.json();

    // 移除 typing 指示器
    removeTypingIndicator();

    // 添加 AI 回复
    messagesEl.appendChild(createMessageElement(data.reply, 'ai', getTimeString()));
    scrollToBottom();
  } catch (err) {
    console.error('发送失败:', err);
    removeTypingIndicator();
    messagesEl.appendChild(
      createMessageElement('抱歉，网络连接出现问题，请稍后重试。', 'ai', getTimeString())
    );
    scrollToBottom();
  } finally {
    isProcessing = false;
    sendBtn.disabled = false;
    uploadBtn.classList.remove('uploading');
    inputEl.focus();
  }
}

// ========== 事件监听 ==========

// 发送按钮
sendBtn.addEventListener('click', sendMessage);

// 键盘事件 — Enter 发送，Shift+Enter 换行
inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// textarea 自动缩放高度
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});

// ========== 文件上传事件 ==========

// 点击上传按钮
uploadBtn.addEventListener('click', () => {
  fileInput.click();
});

// 文件选择
fileInput.addEventListener('change', () => {
  handleFiles(fileInput.files);
  fileInput.value = ''; // 重置，允许重复选同一个文件
});

// ========== 拖拽上传 ==========

// 阻止默认拖拽行为（允许拖放）
['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
  document.body.addEventListener(eventName, (e) => {
    e.preventDefault();
    e.stopPropagation();
  });
});

// 拖入消息区域高亮
messagesEl.addEventListener('dragenter', () => {
  messagesEl.classList.add('drag-over');
});

messagesEl.addEventListener('dragleave', (e) => {
  // 只在真正离开时取消高亮
  if (!messagesEl.contains(e.relatedTarget)) {
    messagesEl.classList.remove('drag-over');
  }
});

messagesEl.addEventListener('dragover', () => {
  messagesEl.classList.add('drag-over');
});

// 放置文件
messagesEl.addEventListener('drop', (e) => {
  messagesEl.classList.remove('drag-over');
  const files = e.dataTransfer.files;
  if (files && files.length > 0) {
    handleFiles(files);
  }
});

// 初始聚焦
inputEl.focus();
</script>

</body>
</html>
